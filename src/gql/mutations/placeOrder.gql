mutation PlaceOrder($input: [OrderInput!]!, $addressId: String!, $paymentMode: String!) {
  placeOrder(input: $input, addressId: $addressId, paymentMode: $paymentMode) {
    ordersData {
      id
      orderId
      invoiceNo
      addressId
      transactionId
      paymentMode
      totalAmount
      status
    }
    paymentData {
      orderId
      state
      expireAt
      redirectUrl
    }
  }
}