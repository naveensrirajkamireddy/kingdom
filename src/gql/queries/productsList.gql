query ProductsList(
  $relatedToId: String
  $brandId: Int
  $categoryId: Int
  $type: String
  $limit: Int!
  $page: Int!
) {
  productsList(
    relatedToId: $relatedToId
    brandId: $brandId
    categoryId: $categoryId
    type: $type
    limit: $limit
    page: $page
  ) {
    id
    productName
    skuCode
    description
    status
    brandId
    categoryId
    subCategoryId
    materialId
    patternId
    vendorId
    purchasePrice
    salePrice
    primaryImage
    images {
      id
      imageUrl
      product {
        id
      }
    }
    variants {
      id
      variantName
      color
      size
      price
      discType
      discValue
      stockQuantity
      status
      product {
        id
      }
    }
    brandName
    categoryName
    materialName
    patternName
    newArrival
    featured
  }
}
